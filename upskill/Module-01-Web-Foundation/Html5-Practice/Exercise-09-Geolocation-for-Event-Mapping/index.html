<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geolocation for Event Mapping</title>
  <style>#welcomeBanner,.highlight{background:#dbeafe;color:#1e3a8a;padding:10px}table{border-collapse:collapse}td{border:1px solid #999;padding:8px}</style>
</head>
<body>
<header><div class="inner"><h1>Local Community Event Portal</h1><nav><a href="#home">Home</a><a href="#events">Events</a><a href="#contact">Contact</a><a href="help.html" target="_blank">Help</a></nav></div></header><main id="home"><h2>9. Geolocation for Event Mapping</h2><button id="locate">Find Nearby Events</button><p id="coords"></p><script>locate.onclick=function(){navigator.geolocation?navigator.geolocation.getCurrentPosition(function(p){coords.textContent='Latitude '+p.coords.latitude+', Longitude '+p.coords.longitude},function(e){coords.textContent=e.message},{enableHighAccuracy:true,timeout:5000}):coords.textContent='Geolocation unavailable'};</script></main><section id="events"><h2>Community Events</h2><p>Browse upcoming local events and register online.</p></section><footer id="contact">Community Services Desk</footer>

</body>
</html>
