<!-- HTML5 Exercise 3 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Message with Styling and ID/Class</title>
  <style>#welcomeBanner,.highlight{background:#dbeafe;color:#1e3a8a;padding:10px}table{border-collapse:collapse}td{border:1px solid #999;padding:8px}</style>
</head>
<body>
<header>
  <div class="inner">
    <h1>Local Community Event Portal</h1>
    <nav><a href="#home">Home</a><a href="#events">Events</a><a href="#contact">Contact</a><a href="help.html" target="_blank">Help</a></nav>
  </div>
</header>
<main id="home">
  <h2>3. Welcome Message with Styling and ID/Class</h2>
  <section>
    <p id="welcomeBanner">Welcome to the Community Event Portal!</p>
    <p class="highlight">This paragraph uses a class selector for reusable styling.</p>
  </section>
</main>
<section id="events">
  <h2>Community Events</h2>
  <p class="highlight">Styled with the shared highlight class.</p>
</section>
<footer id="contact">Community Services Desk</footer>
</body>
</html>
