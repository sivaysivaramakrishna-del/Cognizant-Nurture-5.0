<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration Form</title>
  <style>#welcomeBanner,.highlight{background:#dbeafe;color:#1e3a8a;padding:10px}table{border-collapse:collapse}td{border:1px solid #999;padding:8px}</style>
</head>
<body>
<header><div class="inner"><h1>Local Community Event Portal</h1><nav><a href="#home">Home</a><a href="#events">Events</a><a href="#contact">Contact</a><a href="help.html" target="_blank">Help</a></nav></div></header><main id="home"><h2>5. Event Registration Form</h2><form onsubmit="event.preventDefault(); confirmation.value='Registered '+fullName.value+' for '+eventType.value;"><input id="fullName" type="text" placeholder="Full name" required autofocus><input type="email" placeholder="Email" required><input type="date" required><select id="eventType"><option>Music Night</option><option>Tech Meetup</option><option>Health Camp</option></select><textarea placeholder="Message"></textarea><button>Register</button><output name="confirmation"></output></form></main><section id="events"><h2>Community Events</h2><p>Browse upcoming local events and register online.</p></section><footer id="contact">Community Services Desk</footer>

</body>
</html>
