<!-- HTML5 Exercise 2 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation and Linking</title>
  <style>#welcomeBanner,.highlight{background:#dbeafe;color:#1e3a8a;padding:10px}table{border-collapse:collapse}td{border:1px solid #999;padding:8px}nav a{margin-right:12px}</style>
</head>
<body>
<header>
  <div class="inner">
    <h1>Local Community Event Portal</h1>
    <nav aria-label="Primary">
      <a href="#home">Home</a>
      <a href="#events">Events</a>
      <a href="#contact">Contact</a>
      <a href="help.html">Help Page</a>
      <a href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/a" target="_blank" rel="noopener">MDN Anchor Docs</a>
    </nav>
  </div>
</header>
<main id="home">
  <h2>2. Navigation and Linking</h2>
  <section>
    <h3>Link Types Demonstrated</h3>
    <ul>
      <li><a href="#events">In-page anchor link</a></li>
      <li><a href="help.html">Relative page link</a></li>
      <li><a href="https://www.example.com" target="_blank" rel="noopener">External link</a></li>
    </ul>
  </section>
</main>
<section id="events">
  <h2>Community Events</h2>
  <p>Navigation links above jump to this events section.</p>
</section>
<footer id="contact">Community Services Desk</footer>
</body>
</html>
